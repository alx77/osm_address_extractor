tags:
  load_all: true
  reject: ["source", "source:*", "fixme", "note", "FIXME", "todo", "created_by", "tiger:*", "gnis:*", "nhd:*", "is_in:*"]
tables:
  associated_streets:
    type: relation_member
    columns:
      - name: rel_osm_id
        type: id
        key:
      - name: name
        type: string
        key: name
      - type: string
        name: addr:postcode
        key: addr:postcode
      - name: member_osm_id
        type: member_id
        key:
      - name: role
        type: member_role
      - type: hstore_tags
        name: tags
        key:
    relation_types: [associatedStreet, street]
    mapping:
      type: [associatedStreet, street]
  buildings:
    columns:
    - type: id
      name: osm_id
      key:
    - type: geometry
      name: way
      key:
    - type: string
      name: name
      key: name
    - type: string
      name: housenumber
      key: addr:housenumber
    - type: string
      name: addr:street
      key: addr:street
    - type: string
      name: addr:postcode
      key: addr:postcode
    - type: string
      name: addr:unit
      key: addr:unit
    - type: mapping_value
      name: type
      key:
    type: polygon
    mapping:
      building:
      - __any__
  places:
    columns:
    - type: id
      name: osm_id
      key:
    - type: geometry
      name: way
      key:
    - type: string
      name: name
      key: name
    - type: mapping_value
      name: type
      key:
    - type: hstore_tags
      name: tags
      key:
    type: point
    filters:
      require:
        name: [ __any__ ]
    mapping:
      place:
      - country
      - state
      - region
      - county
      - city
      - town
      - village
      - hamlet
      - suburb
      - locality
  place_areas:
    columns:
    - type: id
      name: osm_id
      key:
    - type: geometry
      name: way
      key:
    - type: string
      name: name
      key: name
    - type: mapping_value
      name: type
      key:
    - type: hstore_tags
      name: tags
      key:
    type: polygon
    filters:
      require:
        name: [ __any__ ]
    mapping:
      place:
      - city
      - town
      - village
      - hamlet
  postal_codes:
    columns:
    - type: id
      name: osm_id
      key:
    - type: geometry
      name: way
      key:
    - type: string
      name: postal_code
      key: postal_code
    - type: hstore_tags
      name: tags
      key:
    type: polygon
    filters:
      require:
        boundary: [ postal_code ]
    mapping:
      boundary:
      - postal_code
  admin:
    columns:
    - type: id
      name: osm_id
      key:
    - type: geometry
      name: way
      key:
    - type: string
      name: name
      key: name
    - type: mapping_value
      name: type
      key:
    - type: string
      name: place
      key: place
    - type: string
      name: postal_code
    - type: integer
      name: admin_level
      key: admin_level
    - type: hstore_tags
      name: tags
      key:
    type: polygon
    filters:
      require:
        name: [ __any__ ]
#    filters:
#      require:
#        place: [ "city","hamlet","town","village","state" ]
    mapping:
      boundary:
      - administrative
  roads:
    columns:
    - type: id
      name: osm_id
      key:
    - type: geometry
      name: way
      key:
    - type: mapping_value
      name: type
      key:
    - type: string
      name: name
      key: name
    - type: hstore_tags
      name: tags
      key:
    - type: mapping_key
      name: class
      key:
    type: linestring
    filters:
      reject:
        area:
        - 'yes'
      require:
        name: [ __any__ ]
    mappings:
      railway:
        mapping:
          railway:
          - rail
          - tram
          - light_rail
          - subway
          - narrow_gauge
          - preserved
          - funicular
          - monorail
          - disused
      roads:
        mapping:
          man_made:
          - pier
          - groyne
          highway:
          - motorway
          - motorway_link
          - trunk
          - trunk_link
          - primary
          - primary_link
          - secondary
          - secondary_link
          - tertiary
          - tertiary_link
          - road
          - path
          - track
          - service
          - footway
          - bridleway
          - cycleway
          - steps
          - pedestrian
          - living_street
          - unclassified
          - residential
          - raceway
          - construction
          - proposed
          - unclassified
          - unknown
  natural_points:
    columns:
    - type: id
      name: osm_id
      key:
    - type: geometry
      name: way
      key:
    - type: string
      name: name
      key: name
    - type: mapping_value
      name: type
      key:
    - type: hstore_tags
      name: tags
      key:
    type: point
    filters:
      require:
        name: [ __any__ ]
    mapping:
      natural:
      - peak
      - volcano
      - glacier
      - cliff
      - cave_entrance
      - spring
      - hot_spring
      - geyser
      - saddle
      - rock
      - stone
      - sinkhole
  natural_areas:
    columns:
    - type: id
      name: osm_id
      key:
    - type: geometry
      name: way
      key:
    - type: string
      name: name
      key: name
    - type: mapping_value
      name: type
      key:
    - type: hstore_tags
      name: tags
      key:
    type: polygon
    filters:
      require:
        name: [ __any__ ]
    mapping:
      natural:
      - water
      - bay
      - strait
      - island
      - islet
      - glacier
      - beach
      - wetland
      - peninsula
      - cape
  waterways:
    columns:
    - type: id
      name: osm_id
      key:
    - type: geometry
      name: way
      key:
    - type: string
      name: name
      key: name
    - type: mapping_value
      name: type
      key:
    - type: hstore_tags
      name: tags
      key:
    type: linestring
    filters:
      require:
        name: [ __any__ ]
    mapping:
      waterway:
      - river
      - canal
  housenumbers:
    columns:
    - type: id
      name: osm_id
      key:
    - type: geometry
      name: way
      key:
    - type: string
      name: name
      key: name
    - type: mapping_value
      name: type
      key:
    - type: string
      name: addr:street
      key: addr:street
    - type: string
      name: addr:postcode
      key: addr:postcode
    - type: string
      name: addr:city
      key: addr:city
    - type: string
      name: addr:unit
      key: addr:unit
    type: point
    mapping:
      addr:housenumber:
      - __any__
